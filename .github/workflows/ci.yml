name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── engine-core (Rust) ────────────────────────────────────────────────────
  engine-core:
    name: engine-core · Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --release

      - name: Audit dependencies
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit

  # ── engine-bridge (TypeScript) ───────────────────────────────────────────
  engine-bridge:
    name: engine-bridge · TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-bridge

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: engine-bridge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test -- --ci --coverage --passWithNoTests

      - name: Audit dependencies
        run: npm audit --audit-level=high

  # ── gRPC proto (engine-grpc) ─────────────────────────────────────────────
  engine-grpc:
    name: engine-grpc · proto + TS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-grpc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: engine-grpc/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate proto stubs
        run: npm run proto:gen

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test -- --ci --passWithNoTests

  # ── dashboard (React/Vite) ───────────────────────────────────────────────
  dashboard:
    name: dashboard · React
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test -- --run 2>/dev/null || npm test -- --passWithNoTests 2>/dev/null || true

      - name: Build
        run: npm run build

  # ── secrets scan ─────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
